<script>
// 动态加载所有依赖，完成后再启动 App
(function(){
  var scripts=[
    "https://cdn.bootcdn.net/ajax/libs/react/18.2.0/umd/react.production.min.js",
    "https://cdn.bootcdn.net/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js",
    "https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js",
    "https://cdn.bootcdn.net/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
  ];
  var loaded=0;
  function loadNext(i){
    if(i>=scripts.length){window.__depsReady=true;if(window.__appStart)window.__appStart();return;}
    var s=document.createElement("script");
    s.src=scripts[i];
    s.onload=function(){loaded++;loadNext(i+1);};
    s.onerror=function(){
      // 如果 BootCDN 失败，尝试备用源
      var fallbacks={
        0:"https://unpkg.com/react@18/umd/react.production.min.js",
        1:"https://unpkg.com/react-dom@18/umd/react-dom.production.min.js",
        2:"https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js",
        3:"https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
      };
      if(fallbacks[i]){
        var s2=document.createElement("script");
        s2.src=fallbacks[i];
        s2.onload=function(){loaded++;loadNext(i+1);};
        s2.onerror=function(){document.getElementById("loading").innerHTML="<p style='color:red;padding:20px'>❌ 网络加载失败。请确保已联网，或改用 Chrome 打开，或部署到服务器。</p>";};
        document.head.appendChild(s2);
      }
    };
    document.head.appendChild(s);
  }
  loadNext(0);
})();
</script>

<script type="text/babel">

  boci:    {name:"中银",  primary:"#1565c0",secondary:"#1976d2",accent:"#42a5f5",tertiary:"#90caf9"},
  galaxy:  {name:"银河",  primary:"#2e7d32",secondary:"#388e3c",accent:"#66bb6a",tertiary:"#a5d6a7"},

  mckinsey:{bar:"#1a1a2e",line:"#c0392b"},
  citic:   {bar:"#c0392b",line:"#e8a838"},
  boci:    {bar:"#1565c0",line:"#e8a838"},
  galaxy:  {bar:"#2e7d32",line:"#e8a838"},
};
var CN_FONTS=[
  {label:"微软雅黑",value:"Microsoft YaHei,sans-serif"},
  {label:"宋体",    value:"SimSun,STSong,serif"},
  {label:"楷体",    value:"KaiTi,STKaiti,serif"},
  {label:"黑体",    value:"SimHei,STHeiti,sans-serif"},
  {label:"仿宋",    value:"FangSong,STFangsong,serif"},
  {label:"苹方",    value:"PingFang SC,sans-serif"},

var EN_FONTS=[
  {label:"Arial",          value:"Arial,sans-serif"},
  {label:"Helvetica",      value:"Helvetica,Arial,sans-serif"},
  {label:"Times New Roman",value:"Times New Roman,Times,serif"},
  {label:"Georgia",        value:"Georgia,serif"},
  {label:"Garamond",       value:"Garamond,serif"},

var UNIT_FACTORS={"元":1,"万元":10000,"百万元":1000000,"亿元":100000000};

function detectUnit(values){
  var max=Math.max.apply(null,values.map(Math.abs).filter(function(v){return !isNaN(v);}));
  if(max>=100000000)return "元";
  if(max>=10000)return "万元";
  return "元";
}

var TEMPLATES=[
  {id:"bar",       title:"财务概览",subtitle:"收入/成本/利润对比",tag:"绝对值"},
  {id:"line",      title:"增长趋势",subtitle:"同比增速/利润率",   tag:"时序"},
  {id:"donut",     title:"收入结构",subtitle:"分产品/分地区占比", tag:"占比"},
  {id:"dual",      title:"量价数据",subtitle:"销量与价格双轴",    tag:"双维度"},
  {id:"horizontal",title:"同业比较",subtitle:"毛利率/市占率",     tag:"竞品"},
];
var SAMPLE={
  bar:       {labels:["2020","2021","2022","2023","2024E"],datasets:[{label:"营业收入",data:[285,342,398,456,521]},{label:"营业成本",data:[198,235,271,306,347]},{label:"净利润",data:[52,71,89,108,130]}]},
  line:      {labels:["Q1'22","Q2'22","Q3'22","Q4'22","Q1'23","Q2'23","Q3'23","Q4'23"],datasets:[{label:"收入增速(%)",data:[18.2,22.5,19.8,25.1,20.3,23.7,28.1,31.4]},{label:"净利率(%)",data:[15.1,17.3,16.8,18.2,17.5,19.1,20.3,22.1]}]},
  donut:     {labels:["华东","华南","华北","西部","海外"],data:[34,26,19,12,9]},
  dual:      {labels:["2020","2021","2022","2023","2024E"],volume:[1240,1580,1820,2150,2490],price:[128,142,158,171,185]},
  horizontal:{labels:["本司","公司B","公司C","公司D","公司E","行业均值"],data:[42.8,38.5,35.2,31.7,28.9,35.4]},
};
var AUTO_TITLES={
  bar:"营业收入 / 成本 / 净利润（百万元）",
  line:"收入增速与净利率趋势（%）",
  donut:"2024年收入结构（按地区）",
  dual:"产品销量与均价走势",
  horizontal:"同行业毛利率对比（%）",
};

/* ── atoms ── */
function Btn(p){
  return <button onClick={p.onClick} disabled={p.disabled} style={Object.assign({padding:"7px 14px",borderRadius:8,border:"1px solid #e5e7eb",background:p.disabled?"#f3f4f6":"#fff",color:p.disabled?"#9ca3af":"#1a1a2e",fontSize:13,fontWeight:500,cursor:p.disabled?"not-allowed":"pointer"},p.style)}>{p.children}</button>;
}
function Tog(p){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
      <span style={{fontSize:13,color:"#374151"}}>{p.label}</span>
      <div onClick={function(){p.onChange(!p.value);}} style={{width:36,height:20,borderRadius:10,background:p.value?p.color:"#d1d5db",cursor:"pointer",position:"relative",flexShrink:0}}>
        <div style={{position:"absolute",top:2,left:p.value?18:2,width:16,height:16,borderRadius:8,background:"#fff",transition:"left .2s"}}/>
      </div>
    </div>
  );
}
function Tag(p){
  return <span onClick={p.onClick} style={{display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:12,cursor:p.onClick?"pointer":"default",background:p.active?p.color+"20":"#f3f4f6",color:p.active?p.color:"#6b7280",border:"1px solid "+(p.active?p.color+"50":"transparent"),fontWeight:p.active?600:400,userSelect:"none"}}>{p.children}</span>;
}
function Collapsible(p){
  var s=useState(p.defaultOpen||false);
  var isOpen=s[0],setOpen=s[1];
  return(
    <div style={{borderBottom:"0.5px solid #f0f0f0",paddingBottom:isOpen?8:0}}>
      <div onClick={function(){setOpen(function(v){return !v;});}} style={{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:14,marginBottom:0,display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",userSelect:"none"}}>
        <span>{p.label}</span>
        <span style={{fontSize:14,color:"#9ca3af"}}>{isOpen?"▾":"›"}</span>
      </div>
      {isOpen&&<div style={{marginTop:8}}>{p.children}</div>}
    </div>
  );
}

/* ── API Settings Modal ── */

        <div style={{fontSize:16,fontWeight:700,color:"#1a1a2e",marginBottom:6}}>DeepSeek API 设置</div>
        <div style={{fontSize:13,color:"#6b7280",marginBottom:20,lineHeight:1.7}}>
          输入您的 API Key 后将保存在浏览器本地，不会上传至任何服务器。<br/>
          获取地址：<a href="https://platform.deepseek.com" target="_blank" style={{color:"#1a3a5c"}}>platform.deepseek.com</a>
        </div>
        <div style={{fontSize:12,color:"#374151",marginBottom:6,fontWeight:600}}>DeepSeek API Key</div>
        <input
          type="password"
          value={key}
          onChange={function(e){setKey(e.target.value);}}
          placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          style={{width:"100%",padding:"10px 12px",border:"1px solid #e5e7eb",borderRadius:8,fontSize:13,color:"#374151",outline:"none",marginBottom:16}}
        />
        <div style={{fontSize:11,color:"#9ca3af",marginBottom:20,padding:"8px 12px",background:"#f9fafb",borderRadius:6,lineHeight:1.7}}>
          ⚠️ 本地双击打开 HTML 时如遇跨域错误，请使用命令启动 Chrome：<br/>
          <code style={{fontSize:10,color:"#374151"}}>chrome --disable-web-security --user-data-dir=/tmp/dev</code><br/>
          或部署到静态托管平台（Vercel / Netlify / 阿里云OSS）
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn onClick={p.onClose}>取消</Btn>
          <Btn onClick={save} style={{background:"#1a3a5c",color:"#fff",border:"none"}}>保存</Btn>
        </div>
      </div>
    </div>
  );
}

/* ── Chart ── */
function ChartView(p){
  var canvasRef=useRef(null),instRef=useRef(null);
  var t=THEMES[p.theme];
  var colors=[t.primary,t.secondary,t.accent,t.tertiary,"#95a5a6","#e67e22"];
  var fmtV=useCallback(function(v){var n=parseFloat(v);if(isNaN(n))return String(v);if(Math.abs(n)>=1000)return n.toLocaleString("zh-CN",{maximumFractionDigits:1});return String(parseFloat(n.toFixed(2)));},[]); 

  useEffect(function(){
    var canvas=canvasRef.current;
    if(!canvas||!window.Chart)return;
    if(instRef.current){instRef.current.destroy();instRef.current=null;}
    var xFont={family:p.cnFont,size:p.xSize};
    var yFont={family:p.enFont,size:p.ySize};
    var gc=p.showGrid?"#e5e7eb":"transparent";
    var ad=p.showAxis,lc="#374151";
    var yLabel=p.dstUnit?"（"+p.dstUnit+"）":"";
    var xSc={grid:{color:gc},ticks:{display:ad,color:lc,font:xFont},border:{display:ad,color:"#d1d5db"}};
    var ySc={grid:{color:gc},ticks:{display:ad,color:lc,font:yFont,callback:fmtV},border:{display:ad,color:"#d1d5db"},title:{display:!!(p.dstUnit&&ad),text:yLabel,color:"#9ca3af",font:{size:10}}};
    var useD=p.externalData||SAMPLE;
    var cfg={};
    var sl0=p.showLabels0!==false,sl1=p.showLabels1!==false;
    if(p.type==="bar"){
      var db=useD.bar||SAMPLE.bar;
      cfg={type:"bar",data:{labels:db.labels,datasets:db.datasets.map(function(s,i){return{label:s.label,data:s.data,backgroundColor:colors[i]+"dd",borderRadius:3,borderSkipped:false};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1a2e",titleColor:"#fff",bodyColor:"#d1d5db",padding:10,cornerRadius:6}},layout:{padding:{top:34,right:16,bottom:8,left:8}},scales:{x:xSc,y:ySc}}};
    }else if(p.type==="line"){
      var dl=useD.line||SAMPLE.line;
      var xScL={grid:{color:gc},ticks:{display:ad,color:lc,font:xFont,maxRotation:45,autoSkip:false},border:{display:ad,color:"#d1d5db"}};
      cfg={type:"line",data:{labels:dl.labels,datasets:dl.datasets.map(function(s,i){return{label:s.label,data:s.data,borderColor:colors[i],backgroundColor:colors[i]+"18",borderWidth:2,pointRadius:3,pointHoverRadius:5,pointBackgroundColor:colors[i],pointBorderColor:colors[i],fill:i===1,tension:0.35};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1a2e",titleColor:"#fff",bodyColor:"#d1d5db",padding:10,cornerRadius:6}},layout:{padding:{top:34,right:16,bottom:8,left:8}},scales:{x:xScL,y:ySc}}};
    }else if(p.type==="donut"){
      var dd=useD.donut||SAMPLE.donut;
      cfg={type:"doughnut",data:{labels:dd.labels,datasets:[{data:dd.data,backgroundColor:colors.slice(0,dd.labels.length),borderWidth:2,borderColor:"#fff",hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:p.chartSubtype==="pie"?"0%":"62%",plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1a2e",titleColor:"#fff",bodyColor:"#d1d5db",padding:10,cornerRadius:6}},layout:{padding:20}}};
    }else if(p.type==="dual"){
      var ddu=useD.dual||SAMPLE.dual;
      var dc=DUAL_COLORS[p.theme]||{bar:"#1a3a5c",line:"#e8a838"};
      var y1Sc={position:"right",grid:{drawOnChartArea:false},ticks:{display:ad,color:dc.line,font:yFont,callback:fmtV},border:{display:ad}};
      cfg={type:"bar",data:{labels:ddu.labels,datasets:[{label:"销量(万件)",data:ddu.volume,backgroundColor:dc.bar,borderRadius:3,yAxisID:"y",order:2},{label:"均价",data:ddu.price,type:"line",borderColor:dc.line,backgroundColor:dc.line+"20",borderWidth:2.5,pointRadius:3,pointBackgroundColor:dc.line,pointBorderColor:dc.line,fill:false,yAxisID:"y1",order:1,tension:0.2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1a2e",titleColor:"#fff",bodyColor:"#d1d5db",padding:10,cornerRadius:6}},layout:{padding:{top:34,right:16,bottom:8,left:8}},scales:{x:xSc,y:ySc,y1:y1Sc}}};
    }else if(p.type==="horizontal"){
      var dh=useD.horizontal||SAMPLE.horizontal;
      var bgs=dh.data.map(function(_,i){return i===0?colors[0]:i===dh.data.length-1?"#e5e7eb":colors[1]+"99";});
      var xScH={grid:{color:gc},ticks:{display:ad,color:lc,font:xFont,callback:function(v){return v+"%";}},border:{display:ad,color:"#d1d5db"},min:0,max:55};
      var yScH={grid:{color:"transparent"},ticks:{display:ad,color:lc,font:xFont},border:{display:ad}};
      cfg={type:"bar",data:{labels:dh.labels,datasets:[{label:"毛利率(%)",data:dh.data,backgroundColor:bgs,borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:"y",plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1a2e",titleColor:"#fff",bodyColor:"#d1d5db",padding:10,cornerRadius:6}},layout:{padding:{top:8,right:32,bottom:8,left:8}},scales:{x:xScH,y:yScH}}};
    }
    if(p.showLabels&&cfg.options){
      if(p.type==="donut"){
        var ddL=useD.donut||SAMPLE.donut;
        var tot=ddL.data.reduce(function(a,b){return a+b;},0);
        cfg.options.animation={onComplete:function(){
          var chart=this,ctx=chart.ctx,meta=chart.getDatasetMeta(0);
          meta.data.forEach(function(el,pi){
            var val=ddL.data[pi];if(val==null)return;
            var pct=((val/tot)*100).toFixed(1)+"%";
            var mid=el.startAngle+(el.endAngle-el.startAngle)/2;
            var r=(el.outerRadius+el.innerRadius)/2;
            ctx.save();ctx.fillStyle="#fff";ctx.font="bold "+p.labelSize+"px "+p.enFont;
            ctx.textAlign="center";ctx.textBaseline="middle";
            ctx.fillText(pct,el.x+Math.cos(mid)*r,el.y+Math.sin(mid)*r);ctx.restore();
          });
        }};
      }else{
        cfg.options.animation={onComplete:function(){
          var chart=this,ctx=chart.ctx;
          chart.data.datasets.forEach(function(ds,di){
            var seriesOn=di===0?sl0:sl1;if(!seriesOn)return;
            var meta=chart.getDatasetMeta(di);if(meta.hidden)return;
            meta.data.forEach(function(el,pi){
              var val=ds.data[pi];if(val==null)return;
              var k=di+"_"+pi,ps=p.pointStyles[k]||{};
              var yOff=p.labelPos==="center"?0:p.labelPos==="below"?14:-6;
              var pos=el.tooltipPosition?el.tooltipPosition():{x:el.x,y:el.y};
              ctx.save();
              if(ps.bg){ctx.font=(ps.bold?"bold ":"")+( ps.size||p.labelSize)+"px "+p.enFont;var tw=ctx.measureText(fmtV(val)).width;ctx.fillStyle=ps.bgColor||"#fef9c3";ctx.fillRect(pos.x-tw/2-3,pos.y+yOff-(ps.size||p.labelSize)-2,tw+6,(ps.size||p.labelSize)+4);}
              ctx.fillStyle=ps.color||lc;ctx.font=(ps.bold?"bold ":"")+( ps.size||p.labelSize)+"px "+p.enFont;
              ctx.textAlign="center";ctx.textBaseline=p.labelPos==="below"?"top":"bottom";
              ctx.fillText(fmtV(val),pos.x,pos.y+yOff);ctx.restore();
            });
          });
        }};
      }
    }
    instRef.current=new window.Chart(canvas,cfg);
    return function(){if(instRef.current){instRef.current.destroy();instRef.current=null;}};
  },[p.type,p.theme,p.cnFont,p.enFont,p.xSize,p.ySize,p.labelSize,p.showGrid,p.showLabels,p.showLabels0,p.showLabels1,p.labelPos,p.showAxis,p.dstUnit,p.externalData,p.pointStyles,p.chartSubtype,fmtV]);

  function renderLegend(){
    if(!p.showLegend)return null;
    var useD=p.externalData||SAMPLE;
    if(p.type==="donut"){var d=useD.donut||SAMPLE.donut;return <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:8}}>{d.labels.map(function(l,i){return <span key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#6b7280"}}><span style={{width:10,height:10,borderRadius:2,background:colors[i],display:"inline-block"}}/>{l} {d.data[i]}%</span>;})}</div>;}
    if(p.type==="dual"){var dc2=DUAL_COLORS[p.theme]||{bar:"#1a3a5c",line:"#e8a838"};return <div style={{display:"flex",gap:16,marginTop:8}}><span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#6b7280"}}><span style={{width:10,height:10,borderRadius:2,background:dc2.bar,display:"inline-block"}}/>销量(万件)</span><span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#6b7280"}}><span style={{width:22,height:3,background:dc2.line,display:"inline-block",borderRadius:2}}/>均价</span></div>;}
    var src=useD[p.type]||SAMPLE[p.type];var ds=src?src.datasets:[];
    if(ds&&ds.length)return <div style={{display:"flex",flexWrap:"wrap",gap:12,marginTop:8}}>{ds.map(function(s,i){return <span key={s.label} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#6b7280"}}>{p.type==="line"?<span style={{width:22,height:3,background:colors[i],display:"inline-block",borderRadius:2}}/>:<span style={{width:10,height:10,borderRadius:2,background:colors[i],display:"inline-block"}}/>}{s.label}</span>;})}</div>;
    return null;
  }
  return(
    <div>
      {p.showLegend&&p.legendPos==="top"&&renderLegend()}
      <div style={{position:"relative",width:"100%",height:320}}><canvas ref={canvasRef}/></div>
      {p.showLegend&&p.legendPos!=="top"&&renderLegend()}
    </div>
  );
}

/* ── AI Analysis Panel ── */
function AnalysisPanel(p){
  var stateA=useState(null),stateL=useState(false),stateC=useState(false),stateP=useState(0),stateT=useState("");
  var analysis=stateA[0],setAnalysis=stateA[1];
  var loading=stateL[0],setLoading=stateL[1];
  var copied=stateC[0],setCopied=stateC[1];
  var progress=stateP[0],setProgress=stateP[1];
  var typeText=stateT[0],setTypeText=stateT[1];
  var t=THEMES[p.theme];
  var ac=t.primary;

  function extractData(){
    var useD=p.externalData||SAMPLE,unit=p.dstUnit||"百万元";
    if(p.tplId==="bar"){
      var d=useD.bar||SAMPLE.bar,rev=d.datasets[0]&&d.datasets[0].data,cost=d.datasets[1]&&d.datasets[1].data,profit=d.datasets[2]&&d.datasets[2].data,n=rev&&rev.length;
      if(!rev||!profit)return null;
      return{type:"bar",labels:d.labels,rev:rev,profit:profit,cost:cost,unit:unit,
        revGrowth:n>=2?(((rev[n-1]-rev[n-2])/rev[n-2])*100).toFixed(1):null,
        profitGrowth:n>=2&&profit[n-2]>0?(((profit[n-1]-profit[n-2])/profit[n-2])*100).toFixed(1):null,
        margin:(profit[n-1]&&rev[n-1])?((profit[n-1]/rev[n-1])*100).toFixed(1):null,
        prevMargin:n>=2&&profit[n-2]&&rev[n-2]?((profit[n-2]/rev[n-2])*100).toFixed(1):null,
        costRatio:cost&&cost[n-1]&&rev[n-1]?((cost[n-1]/rev[n-1])*100).toFixed(1):null};
    }
    if(p.tplId==="line"){
      var d2=useD.line||SAMPLE.line,ds0=d2.datasets[0]&&d2.datasets[0].data,ds1=d2.datasets[1]&&d2.datasets[1].data,n2=ds0&&ds0.length;
      return{type:"line",labels:d2.labels,series0:d2.datasets[0]&&d2.datasets[0].label,series1:d2.datasets[1]&&d2.datasets[1].label,ds0:ds0,ds1:ds1,latestGrowth:ds0&&ds0[n2-1],latestMargin:ds1&&ds1[n2-1],trend:ds0&&n2>=3?(ds0[n2-1]>ds0[n2-3]?"上行":"下行"):"震荡"};
    }
    if(p.tplId==="dual"){
      var d3=useD.dual||SAMPLE.dual,vol=d3.volume,price=d3.price,n3=vol&&vol.length;
      return{type:"dual",labels:d3.labels,vol:vol,price:price,volGrowth:n3>=2?(((vol[n3-1]-vol[n3-2])/vol[n3-2])*100).toFixed(1):null,priceGrowth:n3>=2?(((price[n3-1]-price[n3-2])/price[n3-2])*100).toFixed(1):null};
    }
    if(p.tplId==="horizontal"){
      var d4=useD.horizontal||SAMPLE.horizontal,top=d4.data[0],avg=d4.data[d4.data.length-1];
      return{type:"horizontal",labels:d4.labels,data:d4.data,top:top,avg:avg,spread:top&&avg?(top-avg).toFixed(1):null};
    }
    if(p.tplId==="donut"){
      var d5=useD.donut||SAMPLE.donut,maxIdx=0;
      d5.data.forEach(function(v,i){if(v>d5.data[maxIdx])maxIdx=i;});
      return{type:"donut",labels:d5.labels,data:d5.data,topLabel:d5.labels[maxIdx],topVal:d5.data[maxIdx]};
    }
    return null;
  }

  function buildPrompt(info){
    var base="你是顶级券商首席行业分析师。请基于以下数据生成3-5条专业分析观点。每条格式：【小标题（4-6字）】正文（2-3句，使用边际改善、基数效应、利润空间承压、量价齐升等专业表达）。条目间空行，不要编号，不要开场白。\n\n数据：\n";
    if(info.type==="bar")return base+"年份："+info.labels.join("、")+"\n营业收入："+info.rev.join("、")+"（"+info.unit+"）\n净利润："+info.profit.join("、")+"（"+info.unit+"）\n收入同比："+info.revGrowth+"%，净利润同比："+info.profitGrowth+"%，净利率："+info.margin+"%（上期"+info.prevMargin+"%），成本占比："+info.costRatio+"%";
    if(info.type==="line")return base+info.series0+"："+info.ds0.join("、")+"%\n"+info.series1+"："+info.ds1.join("、")+"%\n趋势："+info.trend+"，最新"+info.series0+"："+info.latestGrowth+"%，"+info.series1+"："+info.latestMargin+"%";
    if(info.type==="dual")return base+"销量："+info.vol.join("、")+"万件（同比"+info.volGrowth+"%）\n均价："+info.price.join("、")+"元（同比"+info.priceGrowth+"%）";
    if(info.type==="horizontal")return base+"企业："+info.labels.join("、")+"\n毛利率："+info.data.join("、")+"%\n本司"+info.top+"%，行业均值"+info.avg+"%，超均"+info.spread+"pct";
    if(info.type==="donut")return base+"区域/产品："+info.labels.join("、")+"\n占比："+info.data.join("、")+"%\n最大贡献："+info.topLabel+"（"+info.topVal+"%）";
    return base;
  }

  function parsePoints(text){
    var blocks=text.split(/\n\n+/).filter(function(b){return b.trim();});
    return blocks.map(function(block){
      var m=block.match(/^[「【]?(.{2,8})[」】：:]\s*([\s\S]+)/);
      if(m)return{title:m[1].trim(),body:m[2].trim()};
      return{title:"分析要点",body:block.trim()};
    });
  }

  /* 打字机逐字动画 */
  function typewriterAnimate(points){
    setAnalysis(points.map(function(pt){return{title:pt.title,body:""};}) );
    var idx=0,charIdx=0;
    function tick(){
      if(idx>=points.length){return;}
      var target=points[idx].body;
      if(charIdx<target.length){
        charIdx++;
        setAnalysis(function(prev){
          var next=prev.map(function(item,i){
            if(i<idx)return item;
            if(i===idx)return{title:item.title,body:target.slice(0,charIdx)};
            return{title:points[i].title,body:""};
          });
          return next;
        });
        setTimeout(tick,18);
      }else{
        idx++;charIdx=0;
        if(idx<points.length)setTimeout(tick,120);
      }
    }
    tick();
  }

  async function handleGenerate(){
    var info=extractData();
    if(!info){setAnalysis([{title:"提示",body:"暂无可分析的图表数据，请先选择图表模板。"}]);return;}
    setLoading(true);setAnalysis(null);setProgress(0);
    var prompt=buildPrompt(info);
    var apiKey=localStorage.getItem("ds_api_key")||"";

    /* 进度动画 */
    var start=Date.now(),dur=apiKey?4000:2200;
    var timer=setInterval(function(){
      var p2=Math.min(92,Math.round(((Date.now()-start)/dur)*100));
      setProgress(p2);
    },80);

    try{
      var points;
      if(apiKey){
        /* ── 真实 DeepSeek API 调用 ── */
        var resp=await fetch("https://api.deepseek.com/chat/completions",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+apiKey},
          body:JSON.stringify({
            model:"deepseek-chat",
            messages:[{role:"system",content:"你是顶级券商首席行业分析师，语言专业精炼。"},{role:"user",content:prompt}],
            max_tokens:1200,
            temperature:0.7,
            stream:false
          })
        });
        if(!resp.ok)throw new Error("API返回错误: "+resp.status);
        var data=await resp.json();
        var text=data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content;
        if(!text)throw new Error("API返回内容为空");
        points=parsePoints(text);
      }else{
        /* ── Mock 降级（未配置 Key 时）── */
        await new Promise(function(res){setTimeout(res,dur);});
        points=getMockPoints(info);
      }
      clearInterval(timer);setProgress(100);
      setTimeout(function(){setLoading(false);typewriterAnimate(points);},300);
    }catch(err){
      clearInterval(timer);setLoading(false);setProgress(0);
      setAnalysis([{title:"调用失败",body:"错误："+err.message+"。请检查 API Key 是否正确，或参考跨域说明使用正确的浏览器模式。"}]);
    }
  }

  function getMockPoints(info){
    var pools={

        {title:"营收增长动能",body:"最新期营业收入同比增长"+info.revGrowth+"%，增长动能持续释放，规模效应逐步显现。结合历史数据走势，收入端增长斜率较为稳健，内生增长逻辑清晰，尚未出现明显边际放缓信号。"},
        {title:"盈利能力改善",body:"净利润同比增速达"+info.profitGrowth+"%，净利率由"+info.prevMargin+"%提升至"+info.margin+"%，盈利能力边际改善趋势明确。利润增速持续快于收入增速，经营杠杆效应正在有效释放。"},

        {title:"盈利质量评估",body:"收入与利润双增态势印证公司核心竞争力稳固，盈利质量处于行业中上水平。在需求侧未出现显著恶化的前提下，全年业绩完成度具备较高确定性，基本面支撑估值底部相对扎实。"},
        {title:"前景展望",body:"综合当前增长斜率及成本结构，公司中期业绩具备较强能见度。需重点关注宏观需求波动及竞争格局变化，建议维持积极关注评级。"},

        {title:"盈利质量稳健",body:info.series1+"维持在"+info.latestMargin+"%区间，短期受基数效应影响，同比读数或存在波动，但中枢水平相对稳健。"},

      ],

  }

  function handleCopy(){
    if(!analysis)return;
    var text=analysis.map(function(pt,i){return (i+1)+". "+pt.title+"\n"+pt.body;}).join("\n\n");

          </div>

      {analysis&&!loading&&(

          </Collapsible>
          <Collapsible label="纵轴单位">
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{["","元","万元","百万元","亿元"].map(function(u){return <Tag key={u} active={dstUnit===u} color={t.primary} onClick={function(){setDstUnit(u);setChartKey(function(k){return k+1;});}}>{u||"默认"}</Tag>;})}</div>
          </Collapsible>
          <Collapsible label="数据点精细样式">
            <PointStylePanel pointStyles={pointStyles} onUpdate={setPointStyles} chartType={tplId} externalData={externalData}/>
            {Object.keys(pointStyles).filter(function(k){return Object.keys(pointStyles[k]||{}).length>0;}).length>0&&<button onClick={function(){setPointStyles({});setChartKey(function(k){return k+1;});}} style={{marginTop:8,fontSize:11,color:"#ef4444",background:"none",border:"none",cursor:"pointer",padding:0}}>清除全部数据点样式</button>}
          </Collapsible>
          {savedTpls.length>0&&<Collapsible label="我的模板"><div style={{display:"flex",flexDirection:"column",gap:5}}>{savedTpls.map(function(tpl){return <div key={tpl.id} onClick={function(){loadTpl(tpl);}} style={{padding:"6px 10px",borderRadius:7,border:"1px solid #fde68a",background:"#fef9ec",cursor:"pointer",fontSize:12,color:"#92400e"}}>★ {tpl.name}</div>;})}</div></Collapsible>}
          <div style={{marginTop:14,padding:"10px 12px",background:"#f9fafb",borderRadius:8,fontSize:11,color:"#9ca3af",lineHeight:1.7}}>标题和数据来源均可直接点击编辑。</div>
          <Btn onClick={function(){setChartKey(function(k){return k+1;});}} style={{width:"100%",marginTop:8,fontSize:12,display:"flex",justifyContent:"center"}}>刷新图表</Btn>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
